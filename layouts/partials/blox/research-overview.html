{{ $page := .wcPage }}
{{ $block := .wcBlock }}

<div class="flex flex-col items-center px-6">
  <div class="w-full max-w-2xl mx-auto">
    <a href="/research/" style="text-decoration:none; color:inherit;">
      <div style="border:1px solid #e5e7eb; border-radius:14px; background:#fff; overflow:hidden; transition:box-shadow 0.15s;" onmouseover="this.style.boxShadow='0 4px 16px rgba(0,0,0,0.08)'" onmouseout="this.style.boxShadow='none'">
        <div style="font-size:15px; font-weight:700; color:#b91c1c; padding:0.75rem 1rem 0;">Research Overview</div>
        <img src="/research/research-overview.png" alt="Research Overview" style="width:100%; display:block;">
      </div>
    </a>
  </div>
</div>
