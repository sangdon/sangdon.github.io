{{ $block := .wcBlock }}
{{ $notice := resources.Get "team-src/notice.md" }}

<div class="flex flex-col items-center px-6">
  <div class="w-full max-w-2xl mx-auto">

    {{ if $block.content.title }}
    <div class="mb-4 text-3xl font-bold text-gray-900 dark:text-white text-center">
      {{ $block.content.title | emojify }}
    </div>
    {{ end }}

    {{ if $notice }}
    <div class="hiring-card-wrapper mt-4">
      <div class="hiring-card-tape"></div>
      <div class="hiring-card prose prose-slate lg:prose-xl dark:prose-invert max-w-none" style="padding:1.5rem 1.75rem; border-radius:14px;">
        {{ $notice.Content | markdownify }}
      </div>
    </div>
    {{ end }}

  </div>
</div>
