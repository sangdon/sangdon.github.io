name: Compile BibTeX to Publications

on:
  push:
    branches: ["main"]
    paths:
      - 'content/authors/Sangdon Park/papers.bib'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile-bib:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install bibtexparser python-slugify pyyaml

      - name: Run bib2yaml
        run: cd content/publication && python3 bib2yaml.py

      - name: Commit generated publications
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/publication/
          git diff --staged --quiet || git commit -m "Auto-compile publications from papers.bib"
          git push
