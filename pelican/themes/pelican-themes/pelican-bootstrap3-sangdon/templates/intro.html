{% extends "base.html" %}

{% block content %}
    {% if pages %}
        {% for page in pages %}
            {% if page.slug == "intro" %}
                <div class="entry-content">
                    {{ page.content }}
                    {% if page.comments == 'enabled' %}
                        {% include 'includes/comments.html' %}
                    {% endif %}
                </div>     
            {% endif%}
	{% endfor %}
    {% endif%}
{% endblock content %}
